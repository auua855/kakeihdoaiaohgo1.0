<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAKEI 2 - 家計簿明細管理</title>
    <meta name="description" content="CSVファイルを読み込んで月ごとに家計簿を管理するPWAアプリ">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <h1>KAKEI 2</h1>
            <div class="header-actions">
                <button id="themeToggle" class="btn btn-icon" aria-label="テーマ切替">
                    <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg id="moonIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <section class="glass-panel total-card">
            <div class="total-label">合計金額</div>
            <div id="grandTotal" class="total-amount">0</div>
        </section>

        <section class="controls">
            <label for="csvPickerDraft" class="btn btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                未確定CSVを取り込む
            </label>
            <input type="file" id="csvPickerDraft" accept=".csv,text/csv,text/plain,application/csv" class="hidden">
            <label for="csvPickerConfirmed" class="btn btn-confirmed">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                確定CSVを取り込む
            </label>
            <input type="file" id="csvPickerConfirmed" accept=".csv,text/csv,text/plain,application/csv" class="hidden">
            <button id="clearData" class="btn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
                データを消去
            </button>
        </section>

        <nav id="monthTabs" class="tabs-container">
            <!-- Tabs will be generated here -->
        </nav>

        <section class="glass-panel search-bar">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" placeholder="店名や項目で検索..." aria-label="キーワード検索">
                <button id="searchBtn" class="btn btn-primary">検索</button>
            </div>
            <div id="searchResultDisplay" class="search-result-info hidden">
                <span class="search-total-label">検索合計:</span>
                <span id="searchTotal" class="search-total-amount">¥0</span>
                <button id="clearSearch" class="btn-text">クリア</button>
            </div>
        </section>

        <main id="expenseList" class="glass-panel">
            <div style="padding: 2rem; text-align: center; color: var(--text-secondary);">
                CSVファイルをアップロードしてください
            </div>
            <!-- Expense items will be generated here -->
        </main>
    </div>

    <!-- Title Input Modal -->
    <div id="titleModal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <h2>インポート設定</h2>
            <p>このデータの名前（例：4月分）を入力してください</p>
            <input type="text" id="batchTitleInput" placeholder="4月分" class="modal-input">
            <div class="modal-actions">
                <button id="cancelImport" class="btn">キャンセル</button>
                <button id="confirmImport" class="btn btn-primary">インポート開始</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
